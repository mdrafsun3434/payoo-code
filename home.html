<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payoo Home</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- tailwind + daisy -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!--font--->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    *{
     font-family: "Outfit", sans-serif;
    }
</style>


</head>


<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 ">

        <section class="w-11/12 mx-auto py-3 border-gray-300 flex justify-between items-center">
            <div class="left flex gap-1">
                <div class="logo w-[60px]">
                    <img src="assets/Logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
            <a href="index.html" class="btn btn-soft "><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
          <p class="text-neutral/50">Enjoy easy and convenient money transfers with us.Cashout charge is low and</p>

      <div class="buttons grid grid-cols-3 gap-3">
     <button onclick="showOnly('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">            
         <img src="assets/opt-1.png" alt="">      
           <p>Add Money</p>
    </button>
     <button onclick="showOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
                </button>
                
     <button onclick="showOnly('send-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-3.png" alt="">
                <p>Send Money</p>
                </button>
     <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-4.png" alt="">
                <p>Get Bonus</p>
                </button>
     <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-5.png" alt="">
                <p>Pay Bill</p>
                </button>
     <button onclick="showOnly('history')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-6.png" alt="">
                <p>Transaction History</p>
                </button>
                                                          



          </div>
    </section>

    <section id="add-money"class="w-11/12 mx-auto py-5">
         <h2 class="text-xl font-bold mb-4">Add Money</h2>
          <div class="form pt-10">
         <div class="card bg-base-100 w-full  shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">


             <label class="label text-neutral font-bol ">Select a Bank</label>
         <select id="add-money-bank" class="select w-full bg-base-200 rounded-full">
          <option disabled selected>Select a Bank</option>
          <option value="DBBL">DBBL</option>
         <option value="IBBL">IBBL</option>
         <option value="City Bank">City Bank</option>
          </select>
          <br>


          <label class="label text-neutral font-bol ">Bank Account  Number</label>
          <input id="add-money-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter Bank Account 11 digit number" />
          <br>

           <label class="label text-neutral font-bol ">Amount</label>
          <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 w-full" placeholder="Enter amount to add" />
          <br>


          <label class="label text-neutral font-bold">4 Digit Pin</label>
          <input id="add-money-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter your 4-digit pin" />
          <button id="add-money-btn" class="btn btn-primary rounded-full mt-4">Add Money</button>
        </fieldset>
      </div>

    </section>

   <section id="cashout" class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-4">Cashout</h2>
        <div class="form pt-10">
         <div class="card bg-base-100 w-full  shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bol ">Agent Number</label>
          <input id="cashout-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter Agent 11 digit number" />
          <br>

           <label class="label text-neutral font-bol ">Amount</label>
          <input id="cashout-amount" type="number" class="input rounded-full bg-base-200 w-full" placeholder="Enter amount for withdraw" />
          <br>


          <label class="label text-neutral font-bold">4 Digit Pin</label>
          <input id="cashout-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter your 4-digit pin" />
          <button id="cashout-btn" class="btn btn-primary rounded-full mt-4">Withdraw Money</button>
        </fieldset>
      </div>
    </div>
    </section>


     <section id="send-money" class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-4">Send Money</h2>
        <div class="form pt-10">
         <div class="card bg-base-100 w-full  shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bol "><bold>User Account Number</bold></label>
          <input id="send-money-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter Agent 11 digit number" />
          <br>

           <label class="label text-neutral font-bol ">Amount</label>
          <input id="send-money-amount" type="number" class="input rounded-full bg-base-200 w-full" placeholder="Enter amount for withdraw" />
          <br>


          <label class="label text-neutral font-bold">4 Digit Pin</label>
          <input id="send-money-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter your 4-digit pin" />
          <button id="send-money-btn" class="btn btn-primary rounded-full mt-4">Send Money</button>
        </fieldset>
      </div>
    </div>
    </section>

      <section id="history" class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold mb-4">Transaction History</h2>
        <div id="history-container">
            <div class="transaction-card p-5 bg-base-100">

            </div>
        </div>
        </section>

  




<script src="script/machine.js"></script>
<script src="script/sendMoney.js"></script>
<script src="script/addMoney.js"></script>
<script src="script/cashout.js"></script>
</body>
</html>
